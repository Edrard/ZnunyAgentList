---
Debugger:
  DebugThreshold: debug
  TestMode: '0'
Description: AdvancedZnunyAgentListREST import template for ZnunyAgentList 1.2.0
FrameworkVersion: 6.5.20
Provider:
  Operation:
    AgentList:
      Description: >-
        Returns a read-only list of valid Znuny agents for integration UI
        selection. Requires authenticated agent access and membership in the
        configured ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: User::AgentList
    QueueList:
      Description: >-
        Returns a read-only list of valid Znuny queues available for ticket
        default resolution and manual ticket creation UI selection. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: Queue::List
    QueueGet:
      Description: >-
        Returns one Znuny queue by QueueID or queue name. This is a read-only
        lookup used to validate queue selection before ticket creation. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: Queue::Get
    QueueGetByName:
      Description: >-
        Returns one Znuny queue by QueueID or queue name. This is a read-only
        lookup used to validate queue selection before ticket creation. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: Queue::Get
    CustomerUserSearch:
      Description: >-
        Searches valid Znuny customer users for integration UI selection. Broad
        wildcard-only searches are rejected by the operation to reduce
        enumeration risk. Requires authenticated agent access and membership in
        the configured ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: CustomerUser::Search
    CustomerUserGet:
      Description: >-
        Returns one Znuny customer user by login using a safe response
        allow-list. Requires authenticated agent access and membership in the
        configured ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: CustomerUser::Get
    TicketSearch:
      Description: >-
        Searches tickets using safe filters, default and maximum result limits,
        and an explicit ticket metadata allow-list. Empty unrestricted searches
        are rejected.
      IncludeTicketData: '0'
      Type: Ticket::Search
    TicketGet:
      Description: >-
        Returns safe ticket metadata by TicketID. Articles and unrestricted
        ticket internals are not returned.
      IncludeTicketData: '0'
      Type: Ticket::Get
    TicketGetByNumber:
      Description: >-
        Returns safe ticket metadata by TicketNumber. Articles and unrestricted
        ticket internals are not returned.
      IncludeTicketData: '0'
      Type: Ticket::Get
    TicketArticleCreate:
      Description: >-
        Adds a controlled article to an existing ticket. Only reply and
        internal_note kinds are accepted, and write access must be enabled and
        authorized through ZnunyAgentList write settings.
      IncludeTicketData: '0'
      Type: Ticket::ArticleCreate
    TicketClose:
      Description: >-
        Closes a ticket through a controlled state change with a required reason
        and a required note/reply article. Generic ticket update fields are not
        accepted.
      IncludeTicketData: '0'
      Type: Ticket::Close
    TicketReopen:
      Description: >-
        Reopens a closed ticket through a controlled state change with a
        required reason and a required note/reply article. Generic ticket update
        fields are not accepted.
      IncludeTicketData: '0'
      Type: Ticket::Reopen
    ResolveTicketDefaults:
      Description: >-
        Resolves default Queue and CustomerUser values from a hostname using the
        ZnunyAgentList hostname convention. This operation is read-only and
        returns warnings when defaults cannot be resolved.
      IncludeTicketData: '0'
      Type: Ticket::ResolveTicketDefaults
    TicketStateList:
      Description: >-
        Returns a read-only list of valid ticket states available in Znuny for
        integration UI selection.
      IncludeTicketData: '0'
      Type: Ticket::StateList
    TicketPriorityList:
      Description: >-
        Returns a read-only list of valid ticket priorities available in Znuny
        for integration UI selection.
      IncludeTicketData: '0'
      Type: Ticket::PriorityList
    TicketTypeList:
      Description: >-
        Returns a read-only list of valid ticket types available in Znuny for
        integration UI selection. If ticket types are disabled or unavailable,
        the operation should return an empty list with a warning.
      IncludeTicketData: '0'
      Type: Ticket::TypeList
    TicketServiceList:
      Description: >-
        Returns a read-only list of valid services available in Znuny for
        integration UI selection. If services are disabled or unavailable, the
        operation should return an empty list with a warning.
      IncludeTicketData: '0'
      Type: Ticket::ServiceList
    TicketSLAList:
      Description: >-
        Returns a read-only list of valid SLAs available in Znuny for
        integration UI selection. If SLAs are disabled or unavailable, the
        operation should return an empty list with a warning.
      IncludeTicketData: '0'
      Type: Ticket::SLAList
    ValidateTicketCreate:
      Description: >-
        Performs non-mutating preflight validation for ticket creation fields
        such as OwnerID, Queue, CustomerUser, State, and Lock. This operation
        never creates or modifies tickets.
      IncludeTicketData: '0'
      Type: Ticket::ValidateTicketCreate
    ZnunyAgentListConfig:
      Description: >-
        Returns authenticated package configuration metadata for ZnunyAgentList,
        including package version and allowed group configuration. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: ZnunyAgentList::Config
    Health:
      Description: >-
        Returns basic health and version information for the ZnunyAgentList
        package. This endpoint is authenticated and group-protected; it is
        intended for integration smoke tests and monitoring of package
        availability.
      IncludeTicketData: '0'
      Type: ZnunyAgentList::Health
  Transport:
    Config:
      AdditionalHeaders: ~
      KeepAlive: ''
      MaxLength: '100000000'
      RouteOperationMapping:
        AgentList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Agent
        QueueList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Queue
        QueueGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Queue/:QueueID
        QueueGetByName:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /QueueByName/:Name
        CustomerUserSearch:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /CustomerUser
        CustomerUserGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /CustomerUser/:UserLogin
        TicketSearch:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Ticket
        TicketGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Ticket/:TicketID
        TicketGetByNumber:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketNumber/:TicketNumber
        TicketArticleCreate:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketArticle
        TicketClose:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketClose
        TicketReopen:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketReopen
        ResolveTicketDefaults:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /ResolveTicketDefaults
        TicketStateList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketState
        TicketPriorityList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketPriority
        TicketTypeList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketType
        TicketServiceList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Service
        TicketSLAList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /SLA
        ValidateTicketCreate:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /ValidateTicketCreate
        ZnunyAgentListConfig:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /SystemConfig
        Health:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Health
    Type: HTTP::REST
RemoteSystem: ''
Requester:
  Transport:
    Type: ''
