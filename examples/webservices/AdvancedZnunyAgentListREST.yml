---
Debugger:
  DebugThreshold: debug
  TestMode: '0'
Description: AdvancedZnunyAgentListREST import template for ZnunyAgentList 1.4.0
FrameworkVersion: 6.5.20
Provider:
  Operation:
    SessionCreate:
      Description: Create a Session.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Session::SessionCreate
    SessionGet:
      Description: Retrieve Session data.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Session::SessionGet
    SessionGetByID:
      Description: Retrieve Session data by SessionID path parameter.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Session::SessionGet
    TicketCreate:
      Description: Create a Ticket through the standard Znuny GenericTicketConnector operation.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Ticket::TicketCreate
    TicketGet:
      Description: Retrieve Ticket data through the standard Znuny GenericTicketConnector operation.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Ticket::TicketGet
    TicketGetList:
      Description: Retrieve Ticket data for a List of Ticket IDs through the standard Znuny GenericTicketConnector operation.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Ticket::TicketGet
    TicketHistoryGet:
      Description: Retrieve Ticket history data through the standard Znuny GenericTicketConnector operation.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Ticket::TicketHistoryGet
    TicketSearch:
      Description: Search for Tickets through the standard Znuny GenericTicketConnector operation.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Ticket::TicketSearch
    TicketUpdate:
      Description: Update a Ticket through the standard Znuny GenericTicketConnector operation.
      MappingInbound: {}
      MappingOutbound: {}
      Type: Ticket::TicketUpdate
    AgentList:
      Description: >-
        Returns a read-only list of valid Znuny agents for integration UI
        selection. Requires authenticated agent access and membership in the
        configured ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: User::AgentList
    QueueList:
      Description: >-
        Returns a read-only list of valid Znuny queues available for ticket
        default resolution and manual ticket creation UI selection. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: Queue::List
    QueueGet:
      Description: >-
        Returns one Znuny queue by QueueID or queue name. This is a read-only
        lookup used to validate queue selection before ticket creation. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: Queue::Get
    QueueGetByName:
      Description: >-
        Returns one Znuny queue by QueueID or queue name. This is a read-only
        lookup used to validate queue selection before ticket creation. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: Queue::Get
    QueueAssignableAgents:
      Description: >-
        Returns active agents who may own tickets in a queue according to
        Znuny owner permission rules. Requires authenticated read access.
      IncludeTicketData: '0'
      Type: Queue::AssignableAgents
    CustomerUserSearch:
      Description: >-
        Searches valid Znuny customer users for integration UI selection. Broad
        wildcard-only searches are rejected by the operation to reduce
        enumeration risk. Requires authenticated agent access and membership in
        the configured ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: CustomerUser::Search
    CustomerUserGet:
      Description: >-
        Returns one Znuny customer user by login using a safe response
        allow-list. Requires authenticated agent access and membership in the
        configured ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: CustomerUser::Get
    ZnunyAgentListTicketSearch:
      Description: >-
        Searches tickets using safe filters, default and maximum result limits,
        and an explicit ticket metadata allow-list. Empty unrestricted searches
        are rejected.
      IncludeTicketData: '0'
      Type: Ticket::Search
    ZnunyAgentListTicketGet:
      Description: >-
        Returns safe ticket metadata by TicketID. Articles and unrestricted
        ticket internals are not returned.
      IncludeTicketData: '0'
      Type: Ticket::Get
    ZnunyAgentListTicketGetByNumber:
      Description: >-
        Returns safe ticket metadata by TicketNumber. Articles and unrestricted
        ticket internals are not returned.
      IncludeTicketData: '0'
      Type: Ticket::Get
    TicketArticleCreate:
      Description: >-
        Adds a controlled article to an existing ticket. Only reply and
        internal_note kinds are accepted, and write access must be enabled and
        authorized through ZnunyAgentList write settings.
      IncludeTicketData: '0'
      Type: Ticket::ArticleCreate
    TicketClose:
      Description: >-
        Closes a ticket through a controlled state change with a required reason
        and a required note/reply article. Generic ticket update fields are not
        accepted.
      IncludeTicketData: '0'
      Type: Ticket::Close
    TicketReopen:
      Description: >-
        Reopens a closed ticket through a controlled state change with a
        required reason and a required note/reply article. Generic ticket update
        fields are not accepted.
      IncludeTicketData: '0'
      Type: Ticket::Reopen
    TicketLock:
      Description: >-
        Locks an existing ticket through the controlled ZnunyAgentList write
        authorization path without creating an article, note, or reply.
      IncludeTicketData: '0'
      Type: Ticket::Lock
    TicketUnlock:
      Description: >-
        Unlocks an existing ticket through the controlled ZnunyAgentList write
        authorization path without creating an article, note, or reply.
      IncludeTicketData: '0'
      Type: Ticket::Unlock
    TicketMoveAssignValidate:
      Description: >-
        Validates a controlled queue, customer, and/or owner change without
        modifying the ticket. Uses the ZnunyAgentList write authorization path.
      IncludeTicketData: '0'
      Type: Ticket::MoveAssignValidate
    TicketMoveAssign:
      Description: >-
        Changes a ticket queue, customer, and/or owner through standard Znuny
        APIs after shared preflight validation and write authorization.
      IncludeTicketData: '0'
      Type: Ticket::MoveAssign
    ResolveTicketDefaults:
      Description: >-
        Resolves default Queue and CustomerUser values from a hostname using the
        ZnunyAgentList hostname convention. This operation is read-only and
        returns warnings when defaults cannot be resolved.
      IncludeTicketData: '0'
      Type: Ticket::ResolveTicketDefaults
    TicketStateList:
      Description: >-
        Returns a read-only list of valid ticket states available in Znuny for
        integration UI selection.
      IncludeTicketData: '0'
      Type: Ticket::StateList
    TicketPriorityList:
      Description: >-
        Returns a read-only list of valid ticket priorities available in Znuny
        for integration UI selection.
      IncludeTicketData: '0'
      Type: Ticket::PriorityList
    TicketTypeList:
      Description: >-
        Returns a read-only list of valid ticket types available in Znuny for
        integration UI selection. If ticket types are disabled or unavailable,
        the operation should return an empty list with a warning.
      IncludeTicketData: '0'
      Type: Ticket::TypeList
    TicketServiceList:
      Description: >-
        Returns a read-only list of valid services available in Znuny for
        integration UI selection. If services are disabled or unavailable, the
        operation should return an empty list with a warning.
      IncludeTicketData: '0'
      Type: Ticket::ServiceList
    TicketSLAList:
      Description: >-
        Returns a read-only list of valid SLAs available in Znuny for
        integration UI selection. If SLAs are disabled or unavailable, the
        operation should return an empty list with a warning.
      IncludeTicketData: '0'
      Type: Ticket::SLAList
    ValidateTicketCreate:
      Description: >-
        Performs non-mutating preflight validation for ticket creation fields
        such as OwnerID, Queue, CustomerUser, State, and Lock. This operation
        never creates or modifies tickets.
      IncludeTicketData: '0'
      Type: Ticket::ValidateTicketCreate
    ZnunyAgentListConfig:
      Description: >-
        Returns authenticated package configuration metadata for ZnunyAgentList,
        including package version and allowed group configuration. Requires
        authenticated agent access and membership in the configured
        ZnunyAgentList allowed group.
      IncludeTicketData: '0'
      Type: ZnunyAgentList::Config
    Health:
      Description: >-
        Returns basic health and version information for the ZnunyAgentList
        package. This endpoint is authenticated and group-protected; it is
        intended for integration smoke tests and monitoring of package
        availability.
      IncludeTicketData: '0'
      Type: ZnunyAgentList::Health
  Transport:
    Config:
      AdditionalHeaders: ~
      KeepAlive: ''
      MaxLength: '100000000'
      RouteOperationMapping:
        SessionCreate:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /Session
        SessionGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Session
        SessionGetByID:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Session/:SessionID
        TicketCreate:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /Ticket
        TicketGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Ticket/:TicketID
        TicketGetList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketList
        TicketHistoryGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketHistory/:TicketID
        TicketSearch:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Ticket
        TicketUpdate:
          ParserBackend: JSON
          RequestMethod:
          - PATCH
          Route: /Ticket/:TicketID
        AgentList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Agent
        QueueList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Queue
        QueueGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Queue/:QueueID
        QueueGetByName:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /QueueByName/:Name
        QueueAssignableAgents:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Queue/:QueueID/AssignableAgents
        CustomerUserSearch:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /CustomerUser
        CustomerUserGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /CustomerUser/:CustomerUserLogin
        ZnunyAgentListTicketSearch:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /ZnunyAgentListTicketSearch
        ZnunyAgentListTicketGet:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /ZnunyAgentListTicket/:TicketID
        ZnunyAgentListTicketGetByNumber:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /ZnunyAgentListTicketNumber/:TicketNumber
        TicketArticleCreate:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketArticle
        TicketClose:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketClose
        TicketReopen:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketReopen
        TicketLock:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketLock
        TicketUnlock:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketUnlock
        TicketMoveAssignValidate:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketMoveAssign/Validate
        TicketMoveAssign:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /TicketMoveAssign
        ResolveTicketDefaults:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /ResolveTicketDefaults
        TicketStateList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketState
        TicketPriorityList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketPriority
        TicketTypeList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /TicketType
        TicketServiceList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Service
        TicketSLAList:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /SLA
        ValidateTicketCreate:
          ParserBackend: JSON
          RequestMethod:
          - POST
          Route: /ValidateTicketCreate
        ZnunyAgentListConfig:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /SystemConfig
        Health:
          ParserBackend: JSON
          RequestMethod:
          - GET
          Route: /Health
    Type: HTTP::REST
RemoteSystem: ''
Requester:
  Transport:
    Type: ''
